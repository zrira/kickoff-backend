services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kickoff-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kickoff
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: kickoff-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kickoff
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: kickoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kickoff}
      POSTGRES_USER: ${DB_USERNAME:-kickoff}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kickoff

  redis:
    image: redis:7-alpine
    container_name: kickoff-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kickoff

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kickoff-horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
    networks:
      - kickoff
    depends_on:
      - app
      - redis

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kickoff-reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    networks:
      - kickoff
    depends_on:
      - app
      - redis

networks:
  kickoff:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
